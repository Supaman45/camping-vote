        <div style={{ textAlign:"center", marginBottom:"28px" }}>
          <p style={{ fontSize:"11px", fontWeight:700, letterSpacing:"2.5px", textTransform:"uppercase", color:"#b8956a", marginBottom:"8px" }}>Family Camping Trip 2026</p>
          <h1 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:"clamp(24px,5vw,38px)", fontWeight:800, color:"#3d2e1a", margin:"0 0 5px 0", lineHeight:1.15 }}>Alta Lake vs. Penrose Point</h1>
          <p style={{ fontSize:"14px", color:"#7a7060", maxWidth:"440px", margin:"0 auto" }}>August 13 - 16, 2026. Compare both parks and vote for your pick.</p>
        </div>
        <div style={{ display:"flex", gap:"3px", marginBottom:"22px", overflowX:"auto", padding:"3px", background:"#f0ebe3", borderRadius:"12px", border:"1px solid #e0d8ca" }}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{ flex:"1 0 auto", padding:"8px 12px", background: tab===t.id?"#fffdf8":"transparent", border: tab===t.id?"1px solid #e0d8ca":"1px solid transparent", borderRadius:"9px", fontSize:"12px", fontWeight: tab===t.id?700:500, color: tab===t.id?"#5c4a2e":"#9a8e7a", cursor:"pointer", whiteSpace:"nowrap", fontFamily:"inherit" }}>{t.label}</button>
          ))}
        </div>
        {loading ? <div style={{ textAlign:"center", padding:"40px", color:"#b8a98e" }}>Loading...</div> : contentMap[tab]()}
        <div style={{ marginTop:"32px", textAlign:"center", padding:"14px", borderTop:"1px solid #e0d8ca", fontSize:"11px", color:"#b8a98e" }}>Strong Family Camping Trip Planning · August 2026</div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(CampingComparison));
</script>
</body>
</html>
